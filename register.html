<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التزام برو - تسجيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #131b24; --gold-color: #cca43b; --text-color: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; text-align: center; }
        
        /* تبديل الأدوار */
        .role-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 10px; border: 1px solid var(--gold-color); background: transparent; color: var(--gold-color); border-radius: 10px; cursor: pointer; }
        .role-btn.active { background: var(--gold-color); color: #000; }
        
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 12px; background: var(--gold-color); border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        
        .footer-link { margin-top: 15px; font-size: 13px; color: var(--gold-color); cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
        .credits { margin-top: 25px; font-size: 10px; color: #7e8b9a; }
    </style>
</head>
<body>

<div class="container">
    <div class="role-switch">
        <button class="role-btn active" id="btn-admin" onclick="setRole('admin')">مدير</button>
        <button class="role-btn" id="btn-employee" onclick="setRole('employee')">موظف</button>
    </div>

    <div id="register-form">
        <h3 id="form-title">إنشاء حساب مدير</h3>
        <input type="text" id="name" placeholder="الاسم الكامل">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="main-btn" onclick="submitData('register')">إنشاء الحساب</button>
    </div>

    <div id="login-form" class="hidden">
        <h3>تسجيل الدخول</h3>
        <input type="tel" id="login-phone" placeholder="رقم الهاتف">
        <input type="password" id="login-password" placeholder="كلمة المرور">
        <button class="main-btn" onclick="submitData('login')">دخول</button>
    </div>

    <div class="footer-link" id="toggle-view" onclick="toggleView()">هل لديك حساب مسبقاً؟ سجل دخولك</div>

    <div class="credits">برمجة وتطوير يونس الكدهي | 775154169</div>
</div>

<script>
    let currentRole = 'admin';

    function setRole(role) {
        currentRole = role;
        document.getElementById('btn-admin').className = role === 'admin' ? 'role-btn active' : 'role-btn';
        document.getElementById('btn-employee').className = role === 'employee' ? 'role-btn active' : 'role-btn';
        document.getElementById('form-title').innerText = role === 'admin' ? 'إنشاء حساب مدير' : 'إنشاء حساب موظف';
    }

    function toggleView() {
        document.getElementById('register-form').classList.toggle('hidden');
        document.getElementById('login-form').classList.toggle('hidden');
        const link = document.getElementById('toggle-view');
        link.innerText = link.innerText.includes('مسبقاً') ? 'إنشاء حساب جديد' : 'هل لديك حساب مسبقاً؟ سجل دخولك';
    }

    function submitData(action) {
        alert(action + " - " + currentRole + " - جاري الإرسال...");
        // هنا يتم إضافة كود tg.sendData
    }
</script>

</body>
</html>
