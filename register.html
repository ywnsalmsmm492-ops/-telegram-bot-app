<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنشاء حساب - التزام برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #131b24;
            --bg-card: #1e293b;
            --text-color: #ffffff;
            --hint-color: #7e8b9a;
            --gold-color: #cca43b;
            --danger-color: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --danger-border: rgba(239, 68, 68, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        /* شعار التزام برو الفخم الموحد */
        .logo-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-box {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 3px solid var(--gold-color);
            font-weight: 800;
            color: #0b141c;
            font-size: 17px;
            text-align: center;
            flex-direction: column;
            line-height: 1.3;
        }
        .logo-icon {
            font-size: 38px;
            margin-bottom: 2px;
        }

        h2 {
            margin: 0 0 20px 0;
            color: var(--gold-color);
            font-size: 18px;
            font-weight: 700;
        }

        /* تصميم حقول الإدخال الفخمة المتناسقة مع الوضع الداكن */
        .input-group {
            position: relative;
            margin-bottom: 12px;
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            box-sizing: border-box;
            text-align: right;
            transition: border-color 0.2s, background 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gold-color);
            background: rgba(255, 255, 255, 0.06);
        }

        input::placeholder {
            color: var(--hint-color);
            font-size: 13px;
        }

        /* زر إنشاء الحساب الذهبي الاحترافي */
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #cca43b, #a37f29);
            color: #0b141c;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 12px rgba(204, 164, 59, 0.2);
        }
        
        button:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, #b38f32, #8c6e22);
        }

        /* تنبيه الأخطاء الأنيق */
        .error {
            color: var(--danger-color);
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            padding: 8px;
            margin-top: 14px;
            margin-bottom: 0;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعار والهوية الرسمية للتطبيق -->
        <div class="logo-section">
            <div class="logo-box">
                <span class="logo-icon">📊</span>
                التزام برو
            </div>
        </div>

        <h2>إنشاء حساب جديد</h2>
        
        <div class="input-group">
            <input type="text" id="name" placeholder="الاسم الكامل أو اسم النشاط التجاري" required>
        </div>
        
        <div class="input-group">
            <input type="tel" id="phone" placeholder="رقم الهاتف (مطلوب)" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة المرور الجديدة" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="confirm_password" placeholder="تأكيد كلمة المرور" required>
        </div>
        
        <button onclick="register()">إنشاء الحساب وبدء العمل</button>
        
        <p class="error" id="error"></p>
    </div>

    <script>
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }
        } catch (e) {
            console.log("خارج بيئة تليجرام العادية");
        }

        function register() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error');

            // دالة داخلية لإظهار الخطأ بشكل أنيق
            function showError(text) {
                errorDiv.innerText = text;
                errorDiv.style.display = 'block';
            }

            // إخفاء الخطأ أولاً عند كل محاولة جديدة
            errorDiv.style.display = 'none';

            if (!name || !phone || !password || !confirm) {
                showError('⚠️ يرجى ملء جميع الحقول المطلوبة.');
                return;
            }
            if (password !== confirm) {
                showError('⚠️ كلمتا المرور غير متطابقتين، يرجى التحقق.');
                return;
            }
            if (password.length < 4) {
                showError('⚠️ كلمة المرور قصيرة جداً (يجب ألا تقل عن 4 أحرف).');
                return;
            }

            // صياغة البيانات لإرسالها
            const data = JSON.stringify({
                action: 'register',
                name: name,
                phone: phone,
                password: password,
                system: 'التزام_برو'
            });

            if (tg) {
                tg.sendData(data);
            } else {
                alert("🎉 تم إنشاء حسابك بنجاح للنشاط: " + name + "\n(سيتم الحفظ والإغلاق تلقائياً داخل البوت)");
            }
        }
    </script>
</body>
</html>
