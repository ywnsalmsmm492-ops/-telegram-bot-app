<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - التزام برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #2d3748;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        button:active {
            background: #4338ca;
        }
        .error {
            color: #e53e3e;
            margin-top: 10px;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📊</div>
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="name" placeholder="الاسم الكامل أو النشاط" required>
        <input type="tel" id="phone" placeholder="رقم الهاتف (مطلوب)" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <input type="password" id="confirm_password" placeholder="تأكيد كلمة المرور" required>
        <button onclick="register()">إنشاء الحساب</button>
        <p class="error" id="error"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // توسيع النافذة

        function register() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error');

            if (!name || !phone || !password || !confirm) {
                errorDiv.innerText = 'يرجى ملء جميع الحقول.';
                return;
            }
            if (password !== confirm) {
                errorDiv.innerText = 'كلمتا المرور غير متطابقتين.';
                return;
            }
            if (password.length < 4) {
                errorDiv.innerText = 'كلمة المرور قصيرة جداً (على الأقل 4 أحرف).';
                return;
            }

            // إرسال البيانات إلى البوت
            const data = JSON.stringify({
                action: 'register',
                name: name,
                phone: phone,
                password: password
            });
            tg.sendData(data);
            // سيغلق التطبيق تلقائياً بعد الإرسال
        }
    </script>
</body>
</html>
