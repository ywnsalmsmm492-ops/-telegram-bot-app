<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التزام برو - تسجيل حساب جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #131b24;
            --bg-card: #1e293b;
            --text-color: #ffffff;
            --hint-color: #7e8b9a;
            --gold-color: #cca43b;
            --gold-gradient: linear-gradient(135deg, #cca43b, #a37f29);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .register-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .form-label {
            font-size: 13px;
            color: var(--hint-color);
            display: block;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            font-family: 'Cairo';
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--gold-color);
        }
        .submit-btn {
            width: 100%;
            background: var(--gold-gradient);
            color: #0b141c;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Cairo';
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .submit-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h3 style="color: var(--gold-color); text-align: center; margin-top: 0; margin-bottom: 20px;">📝 إنشاء حساب مشترك جديد</h3>
        
        <label class="form-label">الاسم الكامل:</label>
        <input type="text" id="regName" class="form-input" placeholder="أدخل الاسم الرباعي">
        
        <label class="form-label">رقم الهاتف الفعال:</label>
        <input type="tel" id="regPhone" class="form-input" placeholder="77xxxxxxx">
        
        <button type="button" class="submit-btn" onclick="submitRegistration()">🚀 إرسال طلب التسجيل لبوت النظام</button>
    </div>

    <script>
        var tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            try { tg.ready(); tg.expand(); } catch(e) {}
        }

        function submitRegistration() {
            var name = document.getElementById('regName').value;
            var phone = document.getElementById('regPhone').value;

            if (!name || !phone) {
                alert("من فضلك، املأ جميع الحقول المطلوبة أولاً!");
                return;
            }

            var payload = {
                action: 'register_user',
                full_name: name,
                phone_number: phone
            };

            // تعديل آمن: الفحص الدقيق والآمن لعمل كود الإرسال من زر المحادثة Inline Button
            if (tg && typeof tg.sendData === 'function') {
                try {
                    tg.sendData(JSON.stringify(payload));
                } catch(err) {
                    alert("خطأ أثناء إرسال البيانات للتيليجرام: " + err.message);
                }
            } else {
                alert("وضع التجربة المحلي (خارج تيليجرام):\n" + JSON.stringify(payload));
            }
        }
    </script>
</body>
</html>
