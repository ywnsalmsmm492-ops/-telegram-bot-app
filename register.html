<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التزام برو - تسجيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #cca43b; --navy: #131b24; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(145deg, #131b24, #0f172a); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .logo { width: 100px; height: 100px; margin-bottom: 15px; border-radius: 50%; border: 3px solid var(--gold); }
        
        .role-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 10px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .role-btn.active { background: var(--gold); color: #000; }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #cca43b, #a37f29); border: none; border-radius: 12px; font-weight: 900; color: #000; cursor: pointer; }
        
        .link { margin-top: 15px; font-size: 13px; color: var(--gold); cursor: pointer; text-decoration: underline; }
        .footer { margin-top: 30px; font-size: 11px; color: #7e8b9a; }
        .footer a { color: var(--gold); text-decoration: none; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.imgur.com/kP47HjH.png" class="logo" alt="logo">
    
    <div class="role-switch" id="role-container">
        <button class="role-btn active" id="btn-admin" onclick="setRole('admin')">مدير</button>
        <button class="role-btn" id="btn-employee" onclick="setRole('employee')">موظف</button>
    </div>

    <h2 id="title">إنشاء حساب مدير</h2>

    <div id="form-content">
        <input type="text" id="name" placeholder="الاسم الكامل" class="admin-only">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <input type="password" id="password" placeholder="كلمة المرور">
        <input type="password" id="confirm_password" placeholder="تأكيد كلمة المرور">
        <button class="main-btn" onclick="submit()">إنشاء الحساب</button>
    </div>

    <div class="link" id="toggle-text" onclick="toggleMode()">هل لديك حساب مسبقاً؟ سجل دخولك</div>

    <div class="footer">
        برمجة وتطوير <a href="https://wa.me/message/ECXIR3SSPZNGJ1" target="_blank">يونس الكدهي | 775154169</a>
    </div>
</div>

<script>
    let isLoginMode = false;
    let currentRole = 'admin';

    function setRole(role) {
        currentRole = role;
        document.getElementById('btn-admin').classList.toggle('active', role === 'admin');
        document.getElementById('btn-employee').classList.toggle('active', role === 'employee');
        document.getElementById('title').innerText = role === 'admin' ? 'إنشاء حساب مدير' : 'إنشاء حساب موظف';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = role === 'admin' ? 'block' : 'none');
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('role-container').classList.toggle('hidden', isLoginMode);
        document.getElementById('title').innerText = isLoginMode ? 'تسجيل الدخول' : (currentRole === 'admin' ? 'إنشاء حساب مدير' : 'إنشاء حساب موظف');
        document.getElementById('toggle-text').innerText = isLoginMode ? 'إنشاء حساب جديد؟' : 'هل لديك حساب مسبقاً؟ سجل دخولك';
        if(isLoginMode) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        else setRole(currentRole);
    }

    function submit() { alert("جاري المعالجة..."); }
</script>

</body>
</html>
