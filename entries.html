<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة القيود - التزام برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #f4f6fa; 
            --bg-card: #ffffff; 
            --text-main: #1d3557; /* درجة الكحلي الملكي الموحد للأرقام والنصوص من شاشتك تماماً */
            --text-secondary: #64748b; 
            --border-color: #cbd5e1; 
            --blue-active: #3b82f6; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 12px;
            margin-top: 10px;
        }
        .logo-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-circle {
            width: 100px;
            height: 100px;
            background: #ffffff;
            border-radius: 50%;
            border: 1.5px solid var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-text-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            margin-top: 6px;
        }
        .logo-text-sub {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 2px 10px 2px;
            margin-top: 14px;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 7px 16px;
            border-radius: 10px;
            font-family: 'Cairo';
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .tab-btn.active {
            background-color: var(--blue-active);
            color: white;
            border-color: var(--blue-active);
        }

        .filters-grid {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-item { flex: 1; }
        .filter-item label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-align: center;
        }
        .filter-select, .filter-input {
            width: 100%;
            padding: 9px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Cairo';
            font-size: 12px;
            background: #ffffff;
            color: var(--text-main);
            box-sizing: border-box;
            text-align: center;
            outline: none;
        }
        .filter-input:focus, .filter-select:focus {
            border-color: #000000;
            border-width: 1.5px;
        }

        /* كروت المجموع الكلي مصفّرة بالكامل وكحلية موحدة كالصورة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-box {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
        }
        .stat-val { 
            font-size: 13px; 
            font-weight: 700; 
            margin-bottom: 4px; 
            color: var(--text-main) !important; /* إجبار اللون الكحلي ومنع أي ألوان أخرى */
        }
        .stat-lbl { font-size: 10px; color: var(--text-secondary); font-weight: 600; }

        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .search-box {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }
        .search-icon-inside {
            position: absolute;
            left: 14px;
            top: 12px;
            color: var(--text-secondary);
        }

        /* كروت القيود الموحدة الألوان والماتشينج مع شاشتك */
        #entriesList { display: flex; flex-direction: column; gap: 12px; }
        .entry-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 14px;
        }
        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .time-stamp { font-size: 11px; color: var(--text-secondary); }
        .status-indicator { font-size: 12px; font-weight: 700; color: var(--text-main); }
        .account-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .meta-text { font-size: 11px; color: var(--text-secondary); }
        .statement-text { font-size: 13px; color: var(--text-main); margin: 6px 0 12px 0; }
        .amount-num { font-size: 16px; font-weight: 800; color: var(--text-main) !important; }

        .bottom-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 12px;
        }
        .circle-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            flex: 1;
        }
        .circle-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            background: #f1f5f9; 
            color: var(--text-main); 
        }
        .btn-lbl { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-top: 4px; }
        .loading-text { text-align: center; color: var(--text-secondary); font-size: 13px; padding: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <div class="logo-box">
                <div class="logo-circle">
                    <img src="https://i.imgur.com/your_uploaded_logo_id.png" alt="التزام برو" class="logo-img" onerror="this.src='📊'">
                </div>
                <div class="logo-text-title">التزام برو</div>
                <div class="logo-text-sub">بوت تليجرام محاسبي ذكي</div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active">يومي</button>
            <button class="tab-btn">أسبوعي</button>
            <button class="tab-btn">شهري</button>
            <button class="tab-btn">سنوي</button>
            <button class="tab-btn">الكل</button>
            <button class="tab-btn">مخصص</button>
        </div>

        <div class="filters-grid">
            <div class="filter-row">
                <div class="filter-item"><label>الحساب</label><select class="filter-select"><option>الكل</option></select></div>
                <div class="filter-item"><label>العملة</label><select class="filter-select"><option>الكل</option></select></div>
                <div class="filter-item"><label>الموظف</label><select class="filter-select"><option>الكل</option></select></div>
            </div>
            <div class="filter-row">
                <div class="filter-item"><label>من تاريخ</label><input type="date" class="filter-input" value="2026-06-06"></div>
                <div class="filter-item"><label>إلى تاريخ</label><input type="date" class="filter-input" value="2026-06-06"></div>
                <div class="filter-item"><label>الصندوق</label><select class="filter-select"><option>الكل</option></select></div>
            </div>
        </div>

        <!-- الأرقام مصفّرة بالكامل ولونها كحلي ملكي موحد وثابت -->
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-val">0</div><div class="stat-lbl">العدد</div></div>
            <div class="stat-box"><div class="stat-val">0.00</div><div class="stat-lbl">إجمالي له</div></div>
            <div class="stat-box"><div class="stat-val">0.00</div><div class="stat-lbl">إجمالي عليه</div></div>
            <div class="stat-box"><div class="stat-val">0.00</div><div class="stat-lbl">إجمالي الرصيد</div></div>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-box" placeholder="ابحث عن قيد بالحساب، البيان أو التاريخ...">
            <span class="search-icon-inside">🔍</span>
        </div>

        <div id="entriesList">
            <div class="loading-text">🔄 جاري جلب القيود الحالية من النظام...</div>
        </div>
    </div>

    <script>
        // الكود الموحد الجاهز للاستقبال
        let tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }
    </script>
</body>
</html>
