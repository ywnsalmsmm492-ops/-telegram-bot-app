<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - التزام برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; text-align: center; }
        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #4f46e5; color: white; }
        .logout { background: #fee2e2; color: #b91c1c; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 لوحة التحكم</h2>
        <button class="btn btn-primary" onclick="sendAction('open_entry_form')">➕ إضافة قيد سريع</button>
        <button class="btn" onclick="sendAction('open_invoice_form')">🧾 فاتورة بيع جديدة</button>
        <button class="btn" onclick="sendAction('open_stock_view')">📦 فحص المخزون</button>
        <button class="btn" onclick="sendAction('open_statement')">📋 كشف حساب عميل</button>
        <button class="btn logout" onclick="sendAction('logout')">🚪 تسجيل خروج</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        function sendAction(action) {
            tg.sendData(JSON.stringify({ action: action }));
        }
    </script>
</body>
</html>
